<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4285F4">
    <title>Aplikasi Wali Murid SITD</title>
    
    <!-- Hubungkan ke Manifest lokal GitHub -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="Portalwalimuridicon.png">
    
    <style>
      body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
      .btn { padding: 10px 20px; background: #4285F4; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
  </head>
  <body>
    <h2>Aplikasi PWA Google Apps Script (via GitHub)</h2>
    <p>Sekarang PWA aktif di GitHub Pages tanpa error 404!</p>
    <button class="btn" onclick="tesKoneksi()">Cek Koneksi Ke Google Sheets</button>

    <script>
      // 1. Daftarkan Service Worker lokal dari GitHub
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('PWA Aktif di GitHub Pages!', reg.scope))
            .catch(err => console.error('Gagal daftar SW:', err));
        });
      }

      // 2. Tembak Google Apps Script menggunakan Fetch API
      const URL_GAS_API = "https://script.google.com/macros/s/AKfycbxEqgKv7zAn6PdKiT9f8cgi9voaxtkpSCcELQQrtYlY3KlgOjSv-2noGK_3DjRySCwt/exec";

      function tesKoneksi() {
        // Contoh melakukan Ambil Riwayat Transaksi via API
        fetch(`${URL_GAS_API}?action=ambilRiwayat&nis=12345`)
          .then(res => res.json())
          .then(data => {
            console.log("Data dari Google Sheets:", data);
            alert("Koneksi ke Google Sheets Sukses!");
          })
          .catch(err => console.error("Error:", err));
      }
    </script>
  </body>
</html>
