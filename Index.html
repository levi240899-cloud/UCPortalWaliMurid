<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4285F4">
    <title>Portal SITD</title>
    
    <!-- Memanggil manifest lokal di GitHub -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="Portalwalimuridicon.png">
    
    <style>
      body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
      .btn { padding: 10px 20px; background: #4285F4; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
  </head>
  <body>
    <h2>Aplikasi PWA Google Apps Script (via GitHub)</h2>
    <p>Sekarang PWA aktif di GitHub Pages tanpa error 404!</p>
    <button class="btn">Halo Dunia</button>

    <script>
      // Mendaftarkan Service Worker lokal (sw.js)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('PWA Aktif di GitHub Pages!', reg.scope))
            .catch(err => console.error('Gagal daftar SW:', err));
        });
      }
    </script>
  </body>
</html>
