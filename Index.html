<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <!-- Memanggil Manifest secara Dinamis -->
    <link rel="manifest" href="<?= getAppUrl() ?>?page=manifest">
    <style>
      body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
      .btn { padding: 10px 20px; background: #4285F4; color: white; border: none; border-radius: 5px; }
    </style>
  </head>
  <body>
    <h2>Aplikasi PWA Google Apps Script</h2>
    <p>Jika berhasil, tombol "Install" atau tanda plus (+) akan muncul di browser kamu!</p>
    <button class="btn">Halo Dunia</button>

    <script>
      // Mendaftarkan Service Worker secara Dinamis
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('<?= getAppUrl() ?>?page=sw')
            .then(reg => console.log('Service Worker terdaftar!', reg))
            .catch(err => console.log('Gagal daftar Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
