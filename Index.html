<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <!-- PWA Meta Tags & Manifest -->
    <meta name="theme-color" content="#4285F4">
    <link rel="manifest" href="<?= getAppUrl() ?>?page=manifest">
    <!-- Link Ikon Apple Menggunakan Ikon Portal Kamu -->
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/levi240899-cloud/UCPortalWaliMurid/main/Portalwalimuridicon.png">
    
    <style>
      body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
      .btn { padding: 10px 20px; background: #4285F4; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
  </head>
  <body>
    <h2>Aplikasi PWA Google Apps Script</h2>
    <p>Jika berhasil, tombol "Install" atau tanda plus (+) akan muncul di browser kamu!</p>
    <button class="btn">Halo Dunia</button>

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('<?= getAppUrl() ?>?page=sw')
            .then(reg => console.log('PWA Service Worker sukses terdaftar!', reg.scope))
            .catch(err => console.error('PWA Service Worker gagal terdaftar:', err));
        });
      }
    </script>
  </body>
</html>
