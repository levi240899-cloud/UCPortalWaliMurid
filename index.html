  <link rel="manifest" href="manifest.json">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl)
          .then(reg => console.log('Service Worker aktif!'))
          .catch(err => console.log('SW Gagal:', err));
      });
    }
    // Contoh logika saat tombol "Aktifkan Notifikasi" diklik setelah Login
function daftarkanTokenWaliMurid(usernameAktif) {
  // 1. Ambil token dari Firebase Messaging
  messaging.getToken({ vpaidKey: 'KEY_ANDA' }).then((currentToken) => {
    if (currentToken) {
      // 2. Kirim token ke Google Apps Script agar disimpan sesuai Username
      fetch("https://script.google.com/macros/s/AKfycbxEqgKv7zAn6PdKiT9f8cgi9voaxtkpSCcELQQrtYlY3KlgOjSv-2noGK_3DjRySCwt/exec", {
        method: "POST",
        body: JSON.stringify({
          action: "simpanToken",
          username: usernameAktif,
          token: currentToken
        })
      })
      .then(res => res.json())
      .then(data => console.log("Token berhasil di-link ke username!"));
    }
  });
}
  </script>
