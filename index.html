<head>

  <!-- Panggil Firebase SDK versi Browser CDN (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>

  <script>
    // 1. Pendaftaran Service Worker bawaan
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl)
          .then(reg => console.log('Service Worker aktif!'))
          .catch(err => console.log('SW Gagal:', err));
      });
    }

    // 2. Inisialisasi Firebase Config Anda
    const firebaseConfig = {
      apiKey: "AIzaSyAmLDdjabshS3TDnpqpo8s3EcIHzU7cUFY",
      authDomain: "portal-wali-murid-sitd.firebaseapp.com",
      projectId: "portal-wali-murid-sitd",
      storageBucket: "portal-wali-murid-sitd.firebasestorage.app",
      messagingSenderId: "1064221825802",
      appId: "1:1064221825802:web:5e55cf811ff03b145878f3",
      measurementId: "G-P0M532JNQL"
    };

    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    // 3. Pemicu Otomatis saat Halaman Terbuka
    window.addEventListener('load', () => {
      // Kita langsung minta izin begitu aplikasi PWA dibuka
      messaging.getToken({ vapidKey: 'BCngnDBQ6GaZX6rY3e6y8O41Wl1OKMfZV59ONwdX_y1yhGPY4YOxFu8shP7GFa6YBvVjE9wnxFFoHlRg8zUz_KY' })
      .then((currentToken) => {
        if (currentToken) {
          console.log("Token FCM didapat:", currentToken);
          
          // Karena belum login, kita kirimkan token ini dengan username sementara "pwa_user"
          // agar tokennya masuk dulu ke Google Sheets Anda!
          fetch("https://script.google.com/macros/s/AKfycbxEqgKv7zAn6PdKiT9f8cgi9voaxtkpSCcELQQrtYlY3KlgOjSv-2noGK_3DjRySCwt/exec", {
            method: "POST",
            body: JSON.stringify({
              action: "simpanToken",
              username: "wali1", // Masukkan username yang ingin Anda tes di sini sementara waktu
              token: currentToken
            })
          })
          .then(res => res.json())
          .then(data => console.log("Token sukses disimpan ke spreadsheet!"))
          .catch(err => console.error("Gagal mengirim token:", err));
        }
      }).catch((err) => {
        console.error("Izin ditolak atau gagal ambil token:", err);
      });
    });
  </script>
